name: Release

# Manual release: bump the version, build the package, run the checks, push the
# bump/tag, publish to npm, and cut a GitHub release.
#
# Auth = npm Trusted Publishing (OIDC): no NPM_TOKEN secret. GitHub mints a
# short-lived OIDC token that npm trusts, and publish records provenance.
# One-time setup on npmjs.com → package "undetermini" → Settings →
# "Trusted Publisher": GitHub Actions, owner=Sraleik, repo=undetermini,
# workflow=release.yaml, environment=<empty>. Trusted publishing needs
# npm >= 11.5.1, which is why this job runs on Node 24 (Node 22 bundles npm 10).
#
# The bump/tag is pushed BEFORE publishing: an npm version is immutable, a git
# push is retryable, so the irreversible step goes last.

on:
  workflow_dispatch:
    inputs:
      release-type:
        type: choice
        required: true
        default: patch
        description: Semver bump
        options:
          - patch
          - minor
          - major

permissions:
  contents: write      # push the version bump + tag, cut the GitHub release
  id-token: write      # mint the OIDC token npm exchanges for publish auth

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node 24 bundles npm >= 11.5.1, which Trusted Publishing needs. Do NOT
      # `npm install -g npm@latest` instead: that pulls npm 12, whose global
      # tree is missing `sigstore`, and every publish dies MODULE_NOT_FOUND.
      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Bump version
        id: bump
        run: |
          npm version ${{ github.event.inputs.release-type }} -m "Release v%s"
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Push bump and tag
        run: git push --follow-tags

      # No --provenance flag: OIDC publishing attaches provenance on its own,
      # and the flag reaches for a `sigstore` module the current npm no longer
      # bundles (MODULE_NOT_FOUND before auth even happens).
      - name: Publish to npm (OIDC + provenance)
        run: npm publish --access public

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: v${{ steps.bump.outputs.version }}
          generate_release_notes: true
